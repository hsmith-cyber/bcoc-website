<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCOC Bylaws v10 (Redlined Draft) — Member Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Source Sans 3',sans-serif;background:#14213d;display:flex;flex-direction:column}
.viewer-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;background:linear-gradient(135deg,#14213d,#1b2d50);color:#fff;padding:14px 22px;border-bottom:4px solid #b82040;flex-wrap:wrap}
.viewer-meta{min-width:0}
.viewer-eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;color:#e8be5a;text-transform:uppercase}
.viewer-title{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;line-height:1.2;color:#fff}
.viewer-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vbtn{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;text-decoration:none;padding:10px 18px;border-radius:6px;transition:all .18s ease}
.vbtn.solid{background:#c8962e;color:#14213d}
.vbtn.solid:hover{background:#e8be5a}
.vbtn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.vbtn.ghost:hover{background:rgba(255,255,255,.12);border-color:#fff}
.vbtn svg{width:14px;height:14px;fill:currentColor}
.draft-strip{background:repeating-linear-gradient(45deg,#b82040 0,#b82040 12px,#7d1129 12px,#7d1129 24px);color:#fff;text-align:center;font-weight:800;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:6px}
.pdf-host{flex:1;display:flex;flex-direction:column;min-height:0}
.pdf-frame{flex:1;width:100%;border:0;background:#525659}
/* Mobile fallback card (iframes can't render PDFs on iOS) */
.mobile-open{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px 24px;text-align:center;background:#1b2d50;color:#fff}
.mobile-open svg{width:64px;height:64px;fill:#e8be5a}
.mobile-open h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:900}
.mobile-open p{font-size:15px;color:#cdd6e6;max-width:340px;line-height:1.55}
.mobile-open .vbtn{font-size:14px;padding:14px 26px}
@media(max-width:560px){.viewer-title{font-size:16px}.vbtn{padding:9px 14px;font-size:11px}}
</style>
</head>
<body>
  <div class="viewer-bar">
    <div class="viewer-meta">
      <div class="viewer-eyebrow">Proposed Revision · For Member Review</div>
      <div class="viewer-title">BCOC Bylaws — Version 10 (Redlined)</div>
    </div>
    <div class="viewer-actions">
      <a class="vbtn ghost" href="BCOC_Members_Documents.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Library
      </a>
      <a class="vbtn solid" href="BCOC_Bylaws_v10_Redlined_Source.pdf" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Open PDF
      </a>
    </div>
  </div>
  <div class="draft-strip">Draft — Tracked Changes Against the Current Adopted Bylaws</div>
  <div class="pdf-host" id="pdfHost">
    <iframe class="pdf-frame" src="BCOC_Bylaws_v10_Redlined_Source.pdf#view=FitH&toolbar=1" title="BCOC Bylaws v10 Redlined Draft"></iframe>
  </div>
  <script>
  (function(){
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 820;
    if(isMobile){
      document.getElementById('pdfHost').innerHTML =
        '<div class="mobile-open">' +
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>' +
        '<h2>Bylaws v10 — Redlined Draft</h2>' +
        '<p>Tap below to open the full redlined document. It will open in your phone&rsquo;s built-in document viewer.</p>' +
        '<a class="vbtn solid" href="BCOC_Bylaws_v10_Redlined_Source.pdf" target="_blank" rel="noopener">Open the Document</a>' +
        '</div>';
    }
  })();
  </script>
</body>
</html>
